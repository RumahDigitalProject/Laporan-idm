<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan Harian T7Z4</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            padding: 10px; 
            overflow-x: hidden;
            transition: background 0.5s ease;
        }
        
        body.hasil-mode {
            background: linear-gradient(-45deg, #74ebd5, #9face6, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* --- SPLASH SCREEN DENGAN FOTO PRIBADI T7Z4.JPG --- */
        #splashScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* Menggunakan file t7z4.jpg yang diupload di folder yang sama */
            /* Ditambahkan lapisan gelap transparan agar teks loading tetap jelas */
            background: linear-gradient(rgba(30,60,114,0.8), rgba(42,82,152,0.8)), url('t7z4.jpg') center/cover;
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease; color: white;
        }
        .db-icon { font-size: 4rem; animation: float 2s ease-in-out infinite; margin-bottom: 20px; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        .loading-text { font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; margin-top: 10px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .progress-container { width: 60%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #38ef7d; box-shadow: 0 0 10px #38ef7d; 
            /* MODIFIKASI: Animasi loading bar disesuaikan ke 7.8s (sedikit kurang dari 8s agar pas saat fade out) */
            animation: loadDb 7.8s forwards ease-in-out; 
        }
        @keyframes loadDb { 0% { width: 0%; } 50% { width: 60%; } 100% { width: 100%; } }

        /* --- CONTAINER UTAMA --- */
        .container { 
            background-color: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); margin-bottom: 20px; backdrop-filter: blur(10px);
        }
        
        h2 { text-align: center; color: #1e3c72; margin-bottom: 15px; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        .status-box { text-align: center; padding: 8px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; margin-bottom: 15px; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .status-connecting { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; animation: pulse 1.5s infinite; }
        .status-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-warning { background-color: #ffeeba; color: #d39e00; border: 1px solid #ffdf7e; }

        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        .spinner { width: 15px; height: 15px; border: 3px solid rgba(0,0,0,0.1); border-top-color: currentColor; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 0.8rem; color: #444; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; text-align: right; background: #fff; transition: 0.3s; }
        input:focus { border-color: #1e3c72; outline: none; box-shadow: 0 0 8px rgba(30, 60, 114, 0.2); }
        input[type="date"] { text-align: left; }
        input[readonly] { cursor: not-allowed; opacity: 0.8; }
        
        .readonly-input { background-color: #f1f3f5; color: #666; font-weight: bold; border: 1px dashed #adb5bd; }
        .auto-calc { background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%); color: #000; font-weight: 900; border: none; box-shadow: inset 0 0 5px rgba(255,255,255,0.5); }
        .hasil-manual { background-color: #f8f9fa; color: #333; font-weight: bold; border: 1px solid #ccc; }

        .btn-utama { width: 100%; background: linear-gradient(to right, #1e3c72, #2a5298); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; margin-top: 10px; cursor: pointer; transition: 0.3s; }
        .btn-wa { width: 100%; background: linear-gradient(to right, #11998e, #38ef7d); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .btn-kembali { width: 100%; background: linear-gradient(to right, #ed213a, #93291e); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        
        .black-divider { border: 0; height: 3px; background: #333; margin: 25px 0; border-radius: 2px;}
        
        #hasilView, #waView { display: none; }
        textarea { width: 100%; height: 380px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.85rem; font-family: monospace; resize: none; margin-bottom: 15px;}
        .grid-hasil { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }

        /* MODAL & ANIMASI ROBOT */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transform: scale(0.9); animation: popIn 0.3s forwards; }
        @keyframes popIn { to { transform: scale(1); } }
        
        #robotFace { font-size: 4.5rem; display: none; margin: 15px 0; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0px); } to { transform: translateY(-20px); } }
        
        .loading-track { width: 100%; height: 15px; background: #eee; border-radius: 10px; overflow: hidden; display: none; margin: 20px 0; border: 1px solid #ddd; }
        .loading-fill { height: 100%; width: 0%; background: linear-gradient(to right, #00529C, #25D366); border-radius: 10px; transition: width 0.1s linear; }

        /* KELAS ANIMASI MUNCUL SATU-SATU */
        .step-hidden { display: none !important; opacity: 0; transform: translateY(-20px); transition: all 0.5s ease; }
        .step-visible { display: block !important; animation: slideDown 0.6s ease forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splashScreen">
        <div class="db-icon">🗄️</div>
        <div class="loading-text">KONEKSI DATABASE T7Z4...</div>
        <div class="progress-container"><div class="progress-bar"></div></div>
    </div>

    <div id="formView" class="container" style="display: none;">
        <h2>Input Laporan T7Z4</h2>
        <div id="serverStatus" class="status-box status-connecting"><div class="spinner"></div> Menghubungkan ke Server...</div>
        
        <div class="form-group"><label>Tanggal Laporan</label><input type="date" id="tanggal" onchange="tarikDataOtomatis()"></div>
        
        <div id="wrapSalesNet">
            <div class="form-group"><label>Sales Net (Manual)</label><input type="tel" id="salesNet" class="format-angka" inputmode="numeric" placeholder="Ketik disini..."></div>
        </div>

        <div id="wrapStruk" class="step-hidden">
            <div class="form-group"><label>Struk (Manual)</label><input type="tel" id="strukHariIni" class="format-angka" inputmode="numeric" placeholder="Ketik disini..."></div>
        </div>

        <div id="wrapSystemData" class="step-hidden">
            <div style="display: flex; gap: 10px; margin-top:20px;">
                <div class="form-group" style="flex: 1;"><label>Akm Sales Kmrn</label><input type="text" id="akmSalesKemarin" class="readonly-input" readonly></div>
                <div class="form-group" style="flex: 1;"><label>Akm Struk Kmrn</label><input type="text" id="akmStrukKemarin" class="readonly-input" readonly></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;"><label>SPD Lalu</label><input type="text" id="spdBulanLalu" class="readonly-input" readonly></div>
                <div class="form-group" style="flex: 1;"><label>STD Lalu</label><input type="text" id="stdBulanLalu" class="readonly-input" readonly></div>
                <div class="form-group" style="flex: 1;"><label>APC Lalu</label><input type="text" id="apcBulanLalu" class="readonly-input" readonly></div>
            </div>
            <button class="btn-utama" id="btnSimpan" onclick="praProsesLaporan()" disabled>PROSES LAPORAN</button>
        </div>
    </div>

    <div id="passModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitle">Konfirmasi Keamanan 🔒</h3>
            <input type="password" id="passInput" inputmode="numeric" placeholder="***" style="text-align: center; font-size: 1.5rem; letter-spacing: 10px;">
            <button id="btnSandi" class="btn-utama" onclick="cekSandi()">VERIFIKASI</button>
            <div id="robotFace">🤖</div>
            <div id="loadingAnim" class="loading-track"><div id="loadingBar" class="loading-fill"></div></div>
            <p id="loadingText" style="display:none; font-size:0.9rem; color:#00529C; font-weight:bold;">Sinkronisasi Selesai...</p>
        </div>
    </div>

    <div id="existModal" class="modal-overlay"><div class="modal-box"><h3>Laporan Sudah Ada! 📂</h3><button class="btn-wa" onclick="tampilkanLaporanLama()">Lihat Laporan 👀</button><button class="btn-kembali" style="margin-top:10px;" onclick="tutupPopUpRiwayat()">Tutup</button></div></div>
    <div id="manualLaluModal" class="modal-overlay"><div class="modal-box"><h3>Data Bulan Lalu Kosong! ⚠️</h3><div class="form-group"><input type="text" id="inputManualSpdLalu" class="format-angka" placeholder="SPD Lalu"></div><div class="form-group"><input type="text" id="inputManualStdLalu" class="format-angka" placeholder="STD Lalu"></div><div class="form-group"><input type="text" id="inputManualApcLalu" class="format-angka" placeholder="APC Lalu"></div><button class="btn-utama" onclick="simpanManualLalu()">LANJUTKAN</button></div></div>

    <div id="hasilView" class="container">
        <h2>Laporan Selesai! ✨</h2>
        <div class="grid-hasil">
            <div class="form-group full-width"><label>Sales Net</label><input type="text" id="resSalesNet" class="hasil-manual" readonly></div>
            <div class="form-group full-width"><label>Akm. Sales</label><input type="text" id="resAkmSales" class="auto-calc" readonly></div>
            <div class="form-group"><label>SPD</label><input type="text" id="resSpd" class="auto-calc" readonly></div>
            <div class="form-group"><label>ACH (%)</label><input type="text" id="resAch" class="auto-calc" readonly></div>
            <div class="form-group"><label>SPD Lalu</label><input type="text" id="resSpdLalu" class="readonly-input" readonly></div>
            <div class="form-group"><label>Growth (%)</label><input type="text" id="resGrowthSpd" class="auto-calc" readonly></div>
        </div>
        <hr class="black-divider">
        <div class="grid-hasil">
            <div class="form-group full-width"><label>Struk</label><input type="text" id="resStruk" class="hasil-manual" readonly></div>
            <div class="form-group full-width"><label>Akm. Struk</label><input type="text" id="resAkmStruk" class="auto-calc" readonly></div>
            <div class="form-group"><label>STD</label><input type="text" id="resStd" class="auto-calc" readonly></div>
            <div class="form-group"><label>STD Lalu</label><input type="text" id="resStdLalu" class="readonly-input" readonly></div>
            <div class="form-group full-width"><label>Growth (%)</label><input type="text" id="resGrowthStd" class="auto-calc" readonly></div>
        </div>
        <hr class="black-divider">
        <div class="grid-hasil">
            <div class="form-group"><label>APC</label><input type="text" id="resApc" class="auto-calc" readonly></div>
            <div class="form-group"><label>APC Lalu</label><input type="text" id="resApcLalu" class="readonly-input" readonly></div>
            <div class="form-group full-width"><label>Growth (%)</label><input type="text" id="resGrowthApc" class="auto-calc" readonly></div>
        </div>
        <div style="margin-top:25px;"><button class="btn-wa" onclick="bukaLaporanWA()">SALIN KE WA 📲</button><button class="btn-kembali" onclick="tutupLaporan()">TUTUP & SELESAI ❌</button></div>
    </div>

    <div id="waView" class="container"><h2>Format WA</h2><textarea id="teksWa" readonly></textarea><button class="btn-utama" onclick="copyKeClipboard()">Copy WA</button><button class="btn-kembali" style="margin-top:10px;" onclick="kembaliKeHasil()">Kembali</button></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLUGybVcGdNb8lGdIROQBWit7k9mc7Qv_03z92fVXRbzJ8H-qrX21pwAJUmknFR_ihRw/exec";
        const KODE_TOKO_PATEN = "T7Z4/MEDOKAN AYU";
        const TARGET_SPD_FIXED = 20115238;
        
        let dataLaporanTersimpan = null;
        let dataBulanLaluGlobal = { spd: 0, std: 0, apc: 0 };
        const yayAudio = new Audio("https://cdn.pixabay.com/download/audio/2021/08/04/audio_c6ccf3232f.mp3?filename=yay-6120.mp3");
        const kicauMusic = new Audio("kicau.mp3"); 
        const robotExpressions = ["🤖", "🧐", "⚙️", "🔧", "💻", "📊", "🚀", "✅"];

        function formatRibuan(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function hapusTitik(s) { return parseInt(s.replace(/\./g, '')) || 0; }
        
        // Listener Form Progresif Canggih (Muncul & Menghilang)
        document.querySelectorAll('.format-angka').forEach(i => { 
            i.addEventListener('input', function() { 
                // Regex paksa buang huruf, hanya sisa angka
                this.value = formatRibuan(this.value.replace(/[^0-9]/g, '')); 
                cekKemajuanForm(); 
            }); 
        });

        // FUNGSI CEK FORM MUNCUL/HILANG OTOMATIS
        function cekKemajuanForm() {
            const net = document.getElementById('salesNet').value;
            const struk = document.getElementById('strukHariIni').value;

            // Logika Kotak Struk
            if(net.length > 0) {
                document.getElementById('wrapStruk').classList.remove('step-hidden');
                document.getElementById('wrapStruk').classList.add('step-visible');
            } else {
                document.getElementById('wrapStruk').classList.remove('step-visible');
                document.getElementById('wrapStruk').classList.add('step-hidden');
                document.getElementById('strukHariIni').value = ''; // Reset struk kalau sales net dihapus
            }

            // Logika System Data & Tombol
            if(net.length > 0 && struk.length > 0 && document.getElementById('strukHariIni').value.length > 0) {
                document.getElementById('wrapSystemData').classList.remove('step-hidden');
                document.getElementById('wrapSystemData').classList.add('step-visible');
            } else {
                document.getElementById('wrapSystemData').classList.remove('step-visible');
                document.getElementById('wrapSystemData').classList.add('step-hidden');
            }
        }

        window.onload = function() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            document.getElementById('tanggal').value = `${year}-${month}-${day}`;
            
            tarikDataOtomatisDibalikLayar(); 

            // MODIFIKASI: SPLASH SCREEN LOGIC (Tunggu 8 Detik)
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    document.getElementById('formView').style.display = 'block';
                }, 500); // Tunggu animasi pudar selesai
            }, 8000); // 8000ms = 8 Detik Pas
        };

        function setStatus(tipe, pesan, showSpinner = false) {
            const box = document.getElementById('serverStatus');
            box.className = `status-box status-${tipe}`;
            box.innerHTML = showSpinner ? `<div class="spinner"></div> ${pesan}` : pesan;
        }

        function tarikDataOtomatisDibalikLayar() {
            const tgl = document.getElementById('tanggal').value;
            if(!tgl) return;
            
            // Sembunyikan form bagian bawah setiap ganti tanggal
            document.getElementById('wrapStruk').className = 'step-hidden';
            document.getElementById('wrapSystemData').className = 'step-hidden';
            document.getElementById('salesNet').value = '';
            document.getElementById('strukHariIni').value = '';

            setStatus('connecting', 'Sinkronisasi Cloud...', true);
            document.getElementById('btnSimpan').disabled = true; 
            document.getElementById('btnSimpan').innerText = "MENUNGGU...";
            
            fetch(`${SCRIPT_URL}?action=getAutoData&tanggal=${tgl}`, { redirect: "follow" })
                .then(res => res.json())
                .then(data => {
                    document.getElementById('akmSalesKemarin').value = formatRibuan(data.akmSalesKemarin);
                    document.getElementById('akmStrukKemarin').value = formatRibuan(data.akmStrukKemarin);
                    document.getElementById('spdBulanLalu').value = formatRibuan(data.spdLalu);
                    document.getElementById('stdBulanLalu').value = formatRibuan(data.stdLalu);
                    document.getElementById('apcBulanLalu').value = formatRibuan(data.apcLalu);
                    
                    dataBulanLaluGlobal.spd = data.spdLalu;
                    dataBulanLaluGlobal.std = data.stdLalu;
                    dataBulanLaluGlobal.apc = data.apcLalu;

                    if (data.isSudahAda) {
                        dataLaporanTersimpan = data.dataHariIni;
                        setStatus('success', '✅ Riwayat Ditemukan (Terkunci)'); 
                        document.getElementById('existModal').style.display='flex';
                        
                        document.getElementById('salesNet').readOnly = true;
                        document.getElementById('strukHariIni').readOnly = true;
                        document.getElementById('btnSimpan').disabled = true;
                        document.getElementById('btnSimpan').innerText = "LAPORAN TERKUNCI 🔒";
                        
                        // Munculkan semua form dalam keadaan terkunci
                        document.getElementById('wrapStruk').className = 'step-visible';
                        document.getElementById('wrapSystemData').className = 'step-visible';
                    } else {
                        dataLaporanTersimpan = null;
                        setStatus('success', '✅ Siap Buat Laporan');
                        
                        document.getElementById('salesNet').readOnly = false;
                        document.getElementById('strukHariIni').readOnly = false;
                        document.getElementById('btnSimpan').disabled = false;
                        document.getElementById('btnSimpan').innerText = "PROSES LAPORAN";
                    }
                }).catch(() => { 
                    setStatus('warning', '⚠️ Gunakan Data Manual'); 
                    document.getElementById('btnSimpan').disabled = false; 
                    document.getElementById('btnSimpan').innerText = "PROSES LAPORAN";
                });
        }

        function tarikDataOtomatis() { tarikDataOtomatisDibalikLayar(); }
        function tutupPopUpRiwayat() { document.getElementById('existModal').style.display = 'none'; }

        function praProsesLaporan() {
            if(!document.getElementById('salesNet').value || !document.getElementById('strukHariIni').value) { alert("Lengkapi data!"); return; }
            if(hapusTitik(document.getElementById('spdBulanLalu').value) === 0) document.getElementById('manualLaluModal').style.display='flex';
            else bukaModalSandi();
        }

        function simpanManualLalu() {
            document.getElementById('spdBulanLalu').value = document.getElementById('inputManualSpdLalu').value;
            document.getElementById('stdBulanLalu').value = document.getElementById('inputManualStdLalu').value;
            document.getElementById('apcBulanLalu').value = document.getElementById('inputManualApcLalu').value;
            document.getElementById('manualLaluModal').style.display='none';
            bukaModalSandi();
        }

        function bukaModalSandi() {
            document.getElementById('passModal').style.display = 'flex';
            document.getElementById('passInput').value = '';
            document.getElementById('passInput').focus();
            document.getElementById('modalTitle').style.display = 'block';
            document.getElementById('passInput').style.display = 'inline-block';
            document.getElementById('btnSandi').style.display = 'inline-block';
            document.getElementById('loadingAnim').style.display = 'none';
            document.getElementById('robotFace').style.display = 'none';
        }

        function cekSandi() {
            if(document.getElementById('passInput').value === "123") {
                document.getElementById('modalTitle').style.display = 'none';
                document.getElementById('passInput').style.display = 'none';
                document.getElementById('btnSandi').style.display = 'none';
                document.getElementById('robotFace').style.display = 'block';
                document.getElementById('loadingAnim').style.display = 'block';
                document.getElementById('loadingText').style.display = 'block';
                kicauMusic.currentTime = 0; kicauMusic.play().catch(e => console.log("Audio diblokir"));
                let progress = 0; let faceIdx = 0;
                let timer = setInterval(() => {
                    progress++; document.getElementById('loadingBar').style.width = progress + "%";
                    if(progress % 12 === 0 && faceIdx < robotExpressions.length - 1) { faceIdx++; document.getElementById('robotFace').innerText = robotExpressions[faceIdx]; }
                    if(progress >= 100) { clearInterval(timer); kicauMusic.pause(); kicauMusic.currentTime = 0; document.getElementById('robotFace').innerText = "🚀"; setTimeout(() => { document.getElementById('passModal').style.display='none'; eksekusiSimpanLaporan(); }, 500); }
                }, 100); 
            } else { alert("Sandi Salah!"); }
        }

        function tampilkanLaporanLama() {
            document.getElementById('existModal').style.display = 'none';
            document.getElementById('salesNet').value = formatRibuan(dataLaporanTersimpan.salesNet);
            document.getElementById('strukHariIni').value = formatRibuan(dataLaporanTersimpan.struk);
            buatTampilanHasil(dataLaporanTersimpan.salesNet, dataLaporanTersimpan.akmSales, dataLaporanTersimpan.spd, dataLaporanTersimpan.struk, dataLaporanTersimpan.akmStruk, dataLaporanTersimpan.std, dataLaporanTersimpan.apc, dataBulanLaluGlobal.spd, dataBulanLaluGlobal.std, dataBulanLaluGlobal.apc);
        }

        function eksekusiSimpanLaporan() {
            const net = hapusTitik(document.getElementById('salesNet').value);
            const akmSalesKmrn = hapusTitik(document.getElementById('akmSalesKemarin').value);
            const struk = hapusTitik(document.getElementById('strukHariIni').value);
            const akmStrukKmrn = hapusTitik(document.getElementById('akmStrukKemarin').value);
            const spdLalu = hapusTitik(document.getElementById('spdBulanLalu').value);
            const stdLalu = hapusTitik(document.getElementById('stdBulanLalu').value);
            const apcLalu = hapusTitik(document.getElementById('apcBulanLalu').value);
            const tglVal = new Date(document.getElementById('tanggal').value);
            const tglHarian = tglVal.getDate();
            const akmSales = net + akmSalesKmrn;
            const spd = Math.round(akmSales / tglHarian);
            const akmStruk = struk + akmStrukKmrn;
            const std = Math.round(akmStruk / tglHarian);
            const apc = std > 0 ? Math.round(spd / std) : 0;
            buatTampilanHasil(net, akmSales, spd, struk, akmStruk, std, apc, spdLalu, stdLalu, apcLalu);
            const hariBulan = new Date(tglVal.getFullYear(), tglVal.getMonth() + 1, 0).getDate();
            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ tanggal: document.getElementById('tanggal').value, kodeToko: KODE_TOKO_PATEN, target: TARGET_SPD_FIXED * hariBulan, salesNet: net, akmSales: akmSales, spd: spd, struk: struk, akmStruk: akmStruk, std: std, apc: apc }) });
        }

        function buatTampilanHasil(net, akmSales, spd, struk, akmStruk, std, apc, spdLalu, stdLalu, apcLalu) {
            const tglVal = new Date(document.getElementById('tanggal').value);
            const tglHarian = tglVal.getDate();
            const hariBulan = new Date(tglVal.getFullYear(), tglVal.getMonth() + 1, 0).getDate();
            const targetTotalBulan = TARGET_SPD_FIXED * hariBulan;
            const achSpd = Math.floor((spd / TARGET_SPD_FIXED) * 100); 
            const acvSales = Math.floor((akmSales / targetTotalBulan) * 100);
            const growthSpd = spdLalu > 0 ? Math.round((spd / spdLalu * 100) - 100) : 0;
            const kurangTarget = targetTotalBulan - akmSales;
            const kurangPerDay = (hariBulan - tglHarian) > 0 ? Math.round(kurangTarget / (hariBulan - tglHarian)) : 0;
            const growthStd = stdLalu > 0 ? Math.round((std / stdLalu * 100) - 100) : 0;
            const growthApc = apcLalu > 0 ? Math.round((apc / apcLalu * 100) - 100) : 0;
            document.getElementById('resSalesNet').value = formatRibuan(net);
            document.getElementById('resAkmSales').value = formatRibuan(akmSales);
            document.getElementById('resSpd').value = formatRibuan(spd);
            document.getElementById('resAch').value = achSpd + '%';
            document.getElementById('resSpdLalu').value = formatRibuan(spdLalu);
            document.getElementById('resGrowthSpd').value = growthSpd + '%';
            document.getElementById('resStruk').value = formatRibuan(struk);
            document.getElementById('resAkmStruk').value = formatRibuan(akmStruk);
            document.getElementById('resStd').value = formatRibuan(std);
            document.getElementById('resStdLalu').value = formatRibuan(stdLalu);
            document.getElementById('resGrowthStd').value = growthStd + '%';
            document.getElementById('resApc').value = formatRibuan(apc);
            document.getElementById('resApcLalu').value = formatRibuan(apcLalu);
            document.getElementById('resGrowthApc').value = growthApc + '%';
            const teksWA = `LAPORAN HARIAN TOKO\n\nKode/Nama Toko : ${KODE_TOKO_PATEN}\nTgl : ${String(tglHarian).padStart(2,'0')}-${String(tglVal.getMonth()+1).padStart(2,'0')}-${tglVal.getFullYear()}\n———————————— \nSales Net : ${formatRibuan(net)}\nStruk : ${formatRibuan(struk)}\nApc : ${formatRibuan(apc)}\nAkumulasi sales Net : ${formatRibuan(akmSales)}\nTarget total : ${formatRibuan(targetTotalBulan)}\nAcv sales : ${acvSales}%\nkekurangan target : ${formatRibuan(kurangTarget)}\nkekurangan target per day : ${formatRibuan(kurangPerDay)}\n————————\n- Target SPD : ${formatRibuan(TARGET_SPD_FIXED)}\n- Actual SPD : ${formatRibuan(spd)}\n- % Penc SPD : ${achSpd}%\n- SPD Bulan lalu : ${formatRibuan(spdLalu)}\n- Growth SPD : ${growthSpd}%\n- STD : ${formatRibuan(std)}\n- APC : ${formatRibuan(apc)}\nTerimakasihh`;
            document.getElementById('teksWa').value = teksWA;
            document.body.classList.add('hasil-mode');
            document.getElementById('formView').style.display = 'none'; 
            document.getElementById('hasilView').style.display = 'block'; 
            window.scrollTo(0,0);
        }

        function tutupLaporan() { yayAudio.play(); setTimeout(() => { alert("🎉 Laporan Berhasil Ditutup!"); location.reload(); }, 300); }
        function bukaLaporanWA() { document.getElementById('hasilView').style.display = 'none'; document.getElementById('waView').style.display = 'block'; window.scrollTo(0,0); }
        function kembaliKeHasil() { document.getElementById('waView').style.display = 'none'; document.getElementById('hasilView').style.display = 'block'; window.scrollTo(0,0); }
        function copyKeClipboard() { const t = document.getElementById('teksWa'); t.select(); t.setSelectionRange(0, 99999); navigator.clipboard.writeText(t.value).then(() => alert("Tersalin!")); }
    </script>
</body>
</html>
